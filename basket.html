<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/basket.css" />
    <title>Document</title>
  </head>
  <body>
    <div>
      <div class="top-div">
        <div>
          <img id="icon-img" src="./assets/images/icon.png" alt="icon" />
        </div>

        <div class="nav">
          <p>OUR COFFEE</p>
          <p>WHOLESALE</p>
          <p>ABOUT US</p>
          <p>CONTACT</p>
        </div>

        <div class="buttons">
          <button class="buttons-lang-button">English</button>
          <button class="buttons-lang-button">AED</button>
          <button>
            <img src="./assets/images/search-outline-svgrepo-com.svg" alt="" />
          </button>
          <button id="go-back-btn">
            <img src="./assets/images/go-back-arrow-svgrepo-com.svg" alt="" />
          </button>
          <button>
            <img src="./assets/images/person-svgrepo-com.svg" alt="" />
          </button>
        </div>
      </div>

      <div class="container">
        <div id="list-container">
          <!-- List items will be dynamically added here -->
        </div>
        
        <div class="buttons-container d-flex justify-content-end gap-2 mt-3">
          <div class="total-cost-div">
            <h4>Total: <span id="total-cost">0</span> $</h4>
          </div>
          <div>
            <button id="clear-btn" class="btn btn-danger">Clear Basket</button>
            <button id="checkout-btn" class="btn btn-success">Checkout</button>
          </div>
        </div>

      </div>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./assets/js/b-script.js"></script>
</html>
